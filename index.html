<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma Collection de Maillots</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --vert: #1a472a;
    --vert-clair: #2d6a3f;
    --gazon: #2e7d32;
    --gazon-clair: #388e3c;
    --blanc: #f5f0e8;
    --or: #c9a84c;
    --or-clair: #e8c96a;
    --gris: #1c1c1c;
    --gris-moyen: #2a2a2a;
    --texte-muted: #8a9a8a;
  }

  body {
    background-color: var(--gris);
    font-family: 'Barlow', sans-serif;
    color: var(--blanc);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* TERRAIN — fond avec lignes gazon */
  .gazon-bg {
    background-color: var(--gris);
    background-image:
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 60px,
        rgba(255,255,255,0.015) 60px,
        rgba(255,255,255,0.015) 61px
      ),
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 60px,
        rgba(255,255,255,0.015) 60px,
        rgba(255,255,255,0.015) 61px
      );
  }

  /* HEADER */
  header {
    position: relative;
    text-align: center;
    padding: 70px 20px 50px;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(200,168,76,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .header-badge {
    display: inline-block;
    border: 1.5px solid var(--or);
    border-radius: 2px;
    padding: 4px 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--or);
    margin-bottom: 20px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(64px, 10vw, 130px);
    line-height: 0.9;
    letter-spacing: 4px;
    color: var(--blanc);
    text-shadow: 0 0 60px rgba(200,168,76,0.2);
  }

  h1 span {
    color: var(--or);
    display: block;
  }

  .header-sub {
    margin-top: 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--texte-muted);
  }

  /* TERRAIN DÉCORATIF */
  .pitch-line {
    width: 100%;
    max-width: 600px;
    margin: 30px auto 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--or), transparent);
    opacity: 0.5;
  }

  .pitch-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    max-width: 400px;
    margin: 0 auto 60px;
    padding: 0 20px;
  }
  .pitch-divider::before,
  .pitch-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200,168,76,0.4));
  }
  .pitch-divider::after {
    transform: scaleX(-1);
  }
  .pitch-divider-icon {
    width: 36px;
    height: 36px;
    border: 1px solid rgba(200,168,76,0.5);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  /* COMPTEUR */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 48px;
    padding: 24px 20px;
    border-top: 1px solid rgba(255,255,255,0.06);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    background: rgba(0,0,0,0.3);
    margin-bottom: 60px;
  }
  .stat-item { text-align: center; }
  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--or);
    line-height: 1;
    display: block;
  }
  .stat-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--texte-muted);
  }

  /* GRILLE MAILLOTS */
  .collection-section {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px 100px;
  }

  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--or);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(200,168,76,0.2);
  }

  .jersey-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }

  /* CARTE MAILLOT */
  .jersey-card {
    background: var(--gris-moyen);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 4px;
    overflow: hidden;
    transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    cursor: pointer;
    position: relative;
  }

  .jersey-card:hover {
    transform: translateY(-6px);
    border-color: rgba(200,168,76,0.4);
    box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(200,168,76,0.15);
  }

  /* Numéro de position */
  .jersey-number {
    position: absolute;
    top: 12px;
    left: 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    color: rgba(200,168,76,0.5);
    letter-spacing: 1px;
    z-index: 2;
    line-height: 1;
  }

  /* Zone photo */
  .jersey-photo-area {
    position: relative;
    height: 260px;
    background:
      linear-gradient(135deg, rgba(255,255,255,0.02) 25%, transparent 25%),
      linear-gradient(225deg, rgba(255,255,255,0.02) 25%, transparent 25%),
      linear-gradient(315deg, rgba(255,255,255,0.02) 25%, transparent 25%),
      linear-gradient(45deg, rgba(255,255,255,0.02) 25%, transparent 25%);
    background-size: 20px 20px;
    background-color: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .jersey-photo-area img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }

  .jersey-card:hover .jersey-photo-area img {
    transform: scale(1.04);
  }

  /* Placeholder quand pas de photo */
  .photo-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    opacity: 0.25;
    pointer-events: none;
    user-select: none;
  }

  .placeholder-shirt {
    width: 72px;
    height: 68px;
  }

  .placeholder-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--blanc);
  }

  /* Overlay upload au hover (quand pas de photo) */
  .upload-overlay {
    position: absolute;
    inset: 0;
    background: rgba(200,168,76,0.08);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
    gap: 8px;
  }

  .jersey-card:hover .upload-overlay {
    opacity: 1;
  }

  .upload-overlay span {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--or);
  }

  .upload-icon {
    width: 32px;
    height: 32px;
    border: 1.5px solid var(--or);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: var(--or);
    line-height: 1;
  }

  /* Input file caché */
  .jersey-card input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    z-index: 10;
    width: 100%;
    height: 260px;
  }

  /* Infos bas de carte */
  .jersey-info {
    padding: 14px 16px 16px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .jersey-info input[type="text"] {
    background: transparent;
    border: none;
    outline: none;
    color: var(--blanc);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    width: 100%;
    margin-bottom: 4px;
    padding: 0;
  }

  .jersey-info input[type="text"]::placeholder {
    color: rgba(245,240,232,0.2);
  }

  .jersey-info input[type="text"]:focus {
    border-bottom: 1px solid rgba(200,168,76,0.4);
  }

  .jersey-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 6px;
  }

  .jersey-info input.year-input {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 1px;
    color: var(--texte-muted);
    width: 80px;
    font-family: 'Barlow', sans-serif;
    text-transform: none;
  }

  /* Badge type (domicile/extérieur/third) */
  .jersey-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 8px;
    border: 1px solid rgba(200,168,76,0.3);
    border-radius: 2px;
    color: rgba(200,168,76,0.7);
    cursor: pointer;
    background: none;
    transition: all 0.2s;
  }

  .jersey-badge:hover,
  .jersey-badge.dom { background: rgba(200,168,76,0.15); border-color: rgba(200,168,76,0.6); color: var(--or); }
  .jersey-badge.ext { background: rgba(52,152,219,0.15); border-color: rgba(52,152,219,0.5); color: #74b9e8; }
  .jersey-badge.third { background: rgba(231,76,60,0.12); border-color: rgba(231,76,60,0.4); color: #e88880; }

  /* BOUTON AJOUTER */
  .add-card {
    background: transparent;
    border: 1px dashed rgba(200,168,76,0.25);
    border-radius: 4px;
    min-height: 340px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.25s ease;
    color: rgba(200,168,76,0.4);
  }

  .add-card:hover {
    border-color: rgba(200,168,76,0.6);
    background: rgba(200,168,76,0.04);
    color: var(--or);
  }

  .add-card-icon {
    font-size: 32px;
    line-height: 1;
  }

  .add-card-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 40px 20px;
    border-top: 1px solid rgba(255,255,255,0.05);
    color: var(--texte-muted);
    font-size: 12px;
    letter-spacing: 2px;
    font-family: 'Barlow Condensed', sans-serif;
    text-transform: uppercase;
  }

  /* Barre en bas de page style terrain */
  .terrain-footer {
    height: 4px;
    background: linear-gradient(90deg, transparent, var(--gazon), var(--gazon-clair), var(--gazon), transparent);
    opacity: 0.6;
  }

  /* Animation d'apparition */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .jersey-card, .add-card {
    animation: fadeUp 0.4s ease both;
  }

  /* Stagger via nth-child */
  .jersey-card:nth-child(1), .add-card:nth-child(1) { animation-delay: 0.05s; }
  .jersey-card:nth-child(2), .add-card:nth-child(2) { animation-delay: 0.10s; }
  .jersey-card:nth-child(3), .add-card:nth-child(3) { animation-delay: 0.15s; }
  .jersey-card:nth-child(4) { animation-delay: 0.20s; }
  .jersey-card:nth-child(5) { animation-delay: 0.25s; }
  .jersey-card:nth-child(6) { animation-delay: 0.30s; }
  .jersey-card:nth-child(7) { animation-delay: 0.35s; }
  .jersey-card:nth-child(8) { animation-delay: 0.40s; }
  .jersey-card:nth-child(9) { animation-delay: 0.45s; }
  .jersey-card:nth-child(10) { animation-delay: 0.50s; }
  .jersey-card:nth-child(11) { animation-delay: 0.55s; }
  .jersey-card:nth-child(12) { animation-delay: 0.60s; }
</style>
</head>
<body class="gazon-bg">

<!-- ===== HEADER ===== -->
<header>
  <div class="header-badge">Maillots disponibles</div>
  <h1>Ma<span>Collection</span></h1>
  <p class="header-sub">Maillots de Football</p>
  <div class="pitch-line"></div>
</header>

<!-- BARRE STATS -->
<div class="stats-bar">
  <div class="stat-item">
    <span class="stat-num" id="total-count">0</span>
    <span class="stat-label">Maillots</span>
  </div>
  <div class="stat-item">
    <span class="stat-num" id="photo-count">0</span>
    <span class="stat-label">Avec photo</span>
  </div>
  <div class="stat-item">
    <span class="stat-num" id="club-count">0</span>
    <span class="stat-label">Clubs</span>
  </div>
</div>

<!-- ===== GRILLE ===== -->
<div class="collection-section">
  <div class="section-title">Vestiaire</div>

  <div class="jersey-grid" id="jersey-grid">
    <!-- Les cartes sont générées en JS -->
  </div>
</div>

<!-- FOOTER -->
<div class="terrain-footer"></div>
<footer>⚽ Collection de Maillots — Double-cliquer sur le nom pour modifier</footer>

<script>
const STORAGE_KEY = 'maillots_collection';

const shirtSVG = `<svg class="placeholder-shirt" viewBox="0 0 72 68" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M26 4 C26 4 30 8 36 8 C42 8 46 4 46 4 L60 14 L52 22 L52 60 H20 V22 L12 14 Z" stroke="white" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
</svg>`;

const badgeTypes = ['DOM', 'EXT', 'THIRD'];
const badgeClasses = ['dom', 'ext', 'third'];

// ---- Sauvegarde ----
function saveAll() {
  const cards = [...document.querySelectorAll('.jersey-card')];
  const data = cards.map(card => ({
    club: card.querySelector('.club-input').value,
    year: card.querySelector('.year-input').value,
    badge: card.querySelector('.jersey-badge').textContent,
    badgeClass: card.querySelector('.jersey-badge').className.replace('jersey-badge','').trim(),
    photo: card.dataset.photo || null
  }));
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {
    // localStorage plein (images trop lourdes) — on prévient
    alert('Espace de stockage insuffisant. Essaie des images moins lourdes (< 1 Mo).');
  }
}

// ---- Badge ----
function cycleBadge(btn) {
  const cur = badgeTypes.findIndex(b => btn.textContent === b);
  const next = (cur + 1) % badgeTypes.length;
  btn.textContent = badgeTypes[next];
  btn.className = 'jersey-badge ' + badgeClasses[next];
  saveAll();
}

// ---- Appliquer une photo sur une carte ----
function applyPhoto(card, base64) {
  const area = card.querySelector('[data-area]');
  const placeholder = area.querySelector('.photo-placeholder');
  if (placeholder) placeholder.remove();
  let img = area.querySelector('img');
  if (!img) {
    img = document.createElement('img');
    area.insertBefore(img, area.querySelector('.upload-overlay'));
  }
  img.src = base64;
  img.alt = 'Maillot';
  card.dataset.hasPhoto = '1';
  card.dataset.photo = base64;
}

// ---- Créer une carte ----
function createCard(num, saved) {
  const card = document.createElement('div');
  card.className = 'jersey-card';
  card.dataset.hasPhoto = '0';

  card.innerHTML = `
    <span class="jersey-number">#${String(num).padStart(2,'0')}</span>
    <div class="jersey-photo-area" data-area>
      <input type="file" accept="image/*" title="Ajouter une photo">
      <div class="photo-placeholder">
        ${shirtSVG}
        <span class="placeholder-text">Ajouter une photo</span>
      </div>
      <div class="upload-overlay">
        <div class="upload-icon">+</div>
        <span>Changer la photo</span>
      </div>
    </div>
    <div class="jersey-info">
      <input type="text" class="club-input" placeholder="Équipe / Club" spellcheck="false" autocomplete="off">
      <div class="jersey-meta">
        <input type="text" class="year-input" placeholder="Saison / Année" spellcheck="false">
        <button class="jersey-badge" onclick="cycleBadge(this)">DOM</button>
      </div>
    </div>
  `;

  // Restaurer les données sauvegardées
  if (saved) {
    card.querySelector('.club-input').value = saved.club || '';
    card.querySelector('.year-input').value = saved.year || '';
    const badge = card.querySelector('.jersey-badge');
    badge.textContent = saved.badge || 'DOM';
    badge.className = 'jersey-badge ' + (saved.badgeClass || 'dom');
    if (saved.photo) applyPhoto(card, saved.photo);
  }

  // Gestion upload photo → convertir en base64 pour persister
  const input = card.querySelector('input[type="file"]');
  input.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      applyPhoto(card, ev.target.result);
      updateStats();
      saveAll();
    };
    reader.readAsDataURL(file);
  });

  card.querySelector('.club-input').addEventListener('input', () => { updateStats(); saveAll(); });
  card.querySelector('.year-input').addEventListener('input', saveAll);

  return card;
}

// ---- Bouton ajouter ----
function createAddButton() {
  const btn = document.createElement('div');
  btn.className = 'add-card';
  btn.innerHTML = `<div class="add-card-icon">+</div><div class="add-card-label">Ajouter un maillot</div>`;
  btn.addEventListener('click', () => {
    const grid = document.getElementById('jersey-grid');
    const cards = grid.querySelectorAll('.jersey-card');
    const newCard = createCard(cards.length + 1, null);
    grid.insertBefore(newCard, btn);
    updateStats();
    renumberCards();
    saveAll();
  });
  return btn;
}

function renumberCards() {
  document.querySelectorAll('.jersey-card').forEach((c, i) => {
    const num = c.querySelector('.jersey-number');
    if (num) num.textContent = '#' + String(i + 1).padStart(2, '0');
  });
}

function updateStats() {
  const cards = [...document.querySelectorAll('.jersey-card')];
  document.getElementById('total-count').textContent = cards.length;
  document.getElementById('photo-count').textContent = cards.filter(c => c.dataset.hasPhoto === '1').length;
  document.getElementById('club-count').textContent = new Set(
    cards.map(c => c.querySelector('.club-input')?.value?.trim()).filter(Boolean)
  ).size;
}

// ---- Init ----
const grid = document.getElementById('jersey-grid');
let saved = [];
try { saved = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) {}

const count = Math.max(saved.length, 12);
for (let i = 0; i < count; i++) {
  grid.appendChild(createCard(i + 1, saved[i] || null));
}
grid.appendChild(createAddButton());
updateStats();
</script>
</body>
</html>
